<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CfA Attendance{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="h-full bg-stone-50 text-stone-900">
    <nav class="bg-stone-800 text-white shadow">
        <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="/" class="text-lg font-semibold tracking-tight">CfA Attendance Tracker</a>
            <a href="/logout" class="text-sm text-stone-300 hover:text-white transition">Log out</a>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-6">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="mb-4 space-y-2">
            {% for category, message in messages %}
            <div class="px-4 py-3 rounded-lg text-sm
                {% if category == 'error' %}bg-red-100 text-red-800 border border-red-200
                {% elif category == 'warning' %}bg-amber-100 text-amber-800 border border-amber-200
                {% else %}bg-emerald-100 text-emerald-800 border border-emerald-200{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>
</body>
</html>
