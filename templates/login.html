<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — CfA Attendance</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full bg-stone-50 flex items-center justify-center">
    <div class="w-full max-w-sm mx-auto px-4">
        <div class="bg-white rounded-xl shadow-md p-8">
            <h1 class="text-xl font-semibold text-stone-800 text-center mb-6">CfA Attendance Tracker</h1>

            {% if error %}
            <div class="mb-4 px-4 py-3 rounded-lg text-sm bg-red-100 text-red-800 border border-red-200">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" class="space-y-4">
                <div>
                    <label for="username" class="block text-sm font-medium text-stone-700 mb-1">Username</label>
                    <input type="text" name="username" id="username" required autofocus
                        class="w-full px-3 py-2 border border-stone-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-stone-500">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-stone-700 mb-1">Password</label>
                    <input type="password" name="password" id="password" required
                        class="w-full px-3 py-2 border border-stone-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-stone-500">
                </div>
                <button type="submit"
                    class="w-full bg-stone-800 text-white py-2 px-4 rounded-lg hover:bg-stone-700 transition font-medium">
                    Log in
                </button>
            </form>
        </div>
    </div>
</body>
</html>
