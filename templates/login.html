<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — CfA Attendance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Nunito+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --terracotta: #b5674e;
            --terracotta-deep: #964f39;
            --parchment: #f5f0e8;
            --parchment-light: #faf7f2;
            --ink: #2c2420;
            --ink-soft: #5c4f47;
            --sage: #8a9a7b;
            --sage-light: #d4dece;
            --gold: #c9a84c;
            --gold-muted: rgba(201, 168, 76, 0.15);
            --error-bg: #fbeae8;
            --error-text: #8b3a2f;
            --error-border: #e8c4be;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--parchment);
            font-family: 'Nunito Sans', sans-serif;
            color: var(--ink);
            position: relative;
            overflow: hidden;
        }

        /* Subtle organic background texture */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 80%, var(--sage-light) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 85% 20%, var(--gold-muted) 0%, transparent 50%),
                radial-gradient(ellipse 40% 40% at 50% 50%, rgba(181, 103, 78, 0.04) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* Grain overlay */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            opacity: 0.3;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.4'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 400px;
            padding: 0 1.5rem;
            animation: rise 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card {
            background: var(--parchment-light);
            border: 1px solid rgba(44, 36, 32, 0.08);
            border-radius: 1rem;
            padding: 2.75rem 2.5rem 2.5rem;
            box-shadow:
                0 1px 3px rgba(44, 36, 32, 0.04),
                0 8px 30px rgba(44, 36, 32, 0.06);
        }

        /* Decorative top accent */
        .login-card::before {
            content: '';
            display: block;
            width: 48px;
            height: 3px;
            background: linear-gradient(90deg, var(--terracotta), var(--gold));
            border-radius: 2px;
            margin: 0 auto 2rem;
        }

        .brand {
            text-align: center;
            margin-bottom: 2rem;
        }

        .brand h1 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            font-size: 1.65rem;
            letter-spacing: 0.01em;
            color: var(--ink);
            line-height: 1.2;
        }

        .brand p {
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            color: var(--ink-soft);
            margin-top: 0.4rem;
            font-weight: 500;
        }

        .error-msg {
            background: var(--error-bg);
            color: var(--error-text);
            border: 1px solid var(--error-border);
            border-radius: 0.5rem;
            padding: 0.65rem 1rem;
            font-size: 0.85rem;
            margin-bottom: 1.25rem;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        .field {
            margin-bottom: 1.25rem;
        }

        .field label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--ink-soft);
            margin-bottom: 0.45rem;
        }

        .field input {
            width: 100%;
            padding: 0.7rem 0.9rem;
            font-family: 'Nunito Sans', sans-serif;
            font-size: 0.95rem;
            color: var(--ink);
            background: var(--parchment);
            border: 1.5px solid rgba(44, 36, 32, 0.12);
            border-radius: 0.5rem;
            outline: none;
            transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
        }

        .field input:focus {
            border-color: var(--terracotta);
            box-shadow: 0 0 0 3px rgba(181, 103, 78, 0.12);
            background: var(--parchment-light);
        }

        .field input::placeholder {
            color: rgba(92, 79, 71, 0.35);
        }

        .submit-btn {
            width: 100%;
            padding: 0.75rem;
            margin-top: 0.5rem;
            font-family: 'Nunito Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            color: var(--parchment-light);
            background: var(--terracotta);
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: background 0.25s, transform 0.15s, box-shadow 0.25s;
            position: relative;
            overflow: hidden;
        }

        .submit-btn:hover {
            background: var(--terracotta-deep);
            box-shadow: 0 4px 14px rgba(150, 79, 57, 0.25);
        }

        .submit-btn:active {
            transform: scale(0.985);
        }

        /* Decorative bottom element */
        .footer-mark {
            text-align: center;
            margin-top: 1.75rem;
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 0.85rem;
            color: var(--sage);
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="brand">
                <h1>Center for Anthroposophy</h1>
                <p>Attendance Tracker</p>
            </div>

            {% if error %}
            <div class="error-msg">{{ error }}</div>
            {% endif %}

            <form method="POST">
                <div class="field">
                    <label for="username">Username</label>
                    <input type="text" name="username" id="username" required autofocus>
                </div>
                <div class="field">
                    <label for="password">Password</label>
                    <input type="password" name="password" id="password" required>
                </div>
                <button type="submit" class="submit-btn">Sign In</button>
            </form>

            <div class="footer-mark">Learning in community</div>
        </div>
    </div>
</body>
</html>
