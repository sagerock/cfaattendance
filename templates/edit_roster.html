{% extends "base.html" %}
{% block title %}Edit Roster — {{ course.name }}{% endblock %}
{% block content %}
<div class="mb-6">
    <a href="/courses/{{ course.id }}" class="text-sm text-stone-500 hover:text-stone-700">&larr; {{ course.name }}</a>
    <h1 class="text-2xl font-bold mt-1">Edit Roster</h1>
</div>

<div class="bg-white border border-stone-200 rounded-lg p-6">
    <form method="POST">
        <table class="w-full text-sm">
            <thead>
                <tr class="border-b border-stone-200">
                    <th class="py-2 text-left">Name</th>
                    <th class="py-2 text-left">Email</th>
                    <th class="py-2 text-left">Phone</th>
                    <th class="py-2 text-left w-16">Delete</th>
                </tr>
            </thead>
            <tbody>
                {% for student in course.students|sort(attribute='name') %}
                <tr class="border-b border-stone-100">
                    <input type="hidden" name="student_id" value="{{ student.id }}">
                    <td class="py-2 pr-2">
                        <input type="text" name="name" value="{{ student.name }}" required
                               class="w-full border border-stone-200 rounded px-2 py-1">
                    </td>
                    <td class="py-2 pr-2">
                        <input type="text" name="email" value="{{ student.email or '' }}"
                               class="w-full border border-stone-200 rounded px-2 py-1 text-stone-500">
                    </td>
                    <td class="py-2 pr-2">
                        <input type="text" name="phone" value="{{ student.phone or '' }}"
                               class="w-full border border-stone-200 rounded px-2 py-1 text-stone-500">
                    </td>
                    <td class="py-2 text-center">
                        <input type="checkbox" name="delete" value="{{ student.id }}" class="rounded">
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <div class="mt-4">
            <button type="submit" class="px-4 py-2 bg-stone-800 text-white rounded-lg hover:bg-stone-700 transition">
                Save Changes
            </button>
        </div>
    </form>
</div>

<!-- Add new students -->
<div class="bg-white border border-stone-200 rounded-lg p-6 mt-6">
    <h2 class="text-lg font-semibold mb-4">Add Students</h2>
    <form method="POST" action="/courses/{{ course.id }}/roster/add">
        <div id="new-rows">
            <div class="flex gap-2 mb-2 new-row">
                <input type="text" name="new_name" placeholder="Name" required
                       class="flex-1 border border-stone-200 rounded px-2 py-1 text-sm">
                <input type="text" name="new_email" placeholder="Email (optional)"
                       class="flex-1 border border-stone-200 rounded px-2 py-1 text-sm text-stone-500">
                <input type="text" name="new_phone" placeholder="Phone (optional)"
                       class="w-36 border border-stone-200 rounded px-2 py-1 text-sm text-stone-500">
            </div>
        </div>
        <div class="mt-3 flex gap-3">
            <button type="button" onclick="addRow()"
                    class="text-sm px-3 py-1.5 border border-stone-300 rounded-lg hover:bg-stone-50 transition">
                + Add another row
            </button>
            <button type="submit" class="text-sm px-4 py-1.5 bg-stone-800 text-white rounded-lg hover:bg-stone-700 transition">
                Add Students
            </button>
        </div>
    </form>
</div>

<script>
function addRow() {
    const container = document.getElementById('new-rows');
    const row = container.querySelector('.new-row').cloneNode(true);
    row.querySelectorAll('input').forEach(i => i.value = '');
    container.appendChild(row);
}
</script>
{% endblock %}
