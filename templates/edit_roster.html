{% extends "base.html" %}
{% block title %}Edit Roster — {{ course.name }}{% endblock %}
{% block content %}
<div class="mb-8">
    <a href="/courses/{{ course.id }}" class="text-sm text-terra hover:text-terra-dark font-body transition">&larr; {{ course.name }}</a>
    <h1 class="text-3xl font-display font-semibold mt-1">Edit Roster</h1>
</div>

<div class="card p-8">
    <form method="POST">
        <table class="w-full text-sm font-body">
            <thead>
                <tr class="border-b border-parchment-dark/40">
                    <th class="py-2.5 text-left text-xs font-semibold uppercase tracking-wider text-ink-light">Name</th>
                    <th class="py-2.5 text-left text-xs font-semibold uppercase tracking-wider text-ink-light">Email</th>
                    <th class="py-2.5 text-left text-xs font-semibold uppercase tracking-wider text-ink-light">Phone</th>
                    <th class="py-2.5 text-left text-xs font-semibold uppercase tracking-wider text-ink-light w-16">Delete</th>
                </tr>
            </thead>
            <tbody>
                {% for student in course.students|sort(attribute='name') %}
                <tr class="border-b border-parchment-dark/20">
                    <input type="hidden" name="student_id" value="{{ student.id }}">
                    <td class="py-2 pr-2">
                        <input type="text" name="name" value="{{ student.name }}" required
                               class="w-full rounded px-2 py-1 text-sm">
                    </td>
                    <td class="py-2 pr-2">
                        <input type="text" name="email" value="{{ student.email or '' }}"
                               class="w-full rounded px-2 py-1 text-sm text-ink-light">
                    </td>
                    <td class="py-2 pr-2">
                        <input type="text" name="phone" value="{{ student.phone or '' }}"
                               class="w-full rounded px-2 py-1 text-sm text-ink-light">
                    </td>
                    <td class="py-2 text-center">
                        <input type="checkbox" name="delete" value="{{ student.id }}" class="rounded accent-terra">
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <div class="mt-6">
            <button type="submit" class="btn-primary px-5 py-2.5 rounded-lg font-body text-sm font-semibold">
                Save Changes
            </button>
        </div>
    </form>
</div>

<!-- Add new students -->
<div class="card p-8 mt-6">
    <h2 class="font-display text-xl font-semibold mb-5">Add Students</h2>
    <form method="POST" action="/courses/{{ course.id }}/roster/add">
        <div id="new-rows">
            <div class="flex gap-2 mb-2 new-row">
                <input type="text" name="new_name" placeholder="Name" required
                       class="flex-1 rounded px-2 py-1.5 text-sm font-body">
                <input type="text" name="new_email" placeholder="Email (optional)"
                       class="flex-1 rounded px-2 py-1.5 text-sm text-ink-light font-body">
                <input type="text" name="new_phone" placeholder="Phone (optional)"
                       class="w-36 rounded px-2 py-1.5 text-sm text-ink-light font-body">
            </div>
        </div>
        <div class="mt-4 flex gap-3">
            <button type="button" onclick="addRow()"
                    class="btn-secondary text-sm px-3 py-1.5 rounded-lg font-body">
                + Add another row
            </button>
            <button type="submit" class="btn-primary text-sm px-5 py-1.5 rounded-lg font-body font-semibold">
                Add Students
            </button>
        </div>
    </form>
</div>

<script>
function addRow() {
    const container = document.getElementById('new-rows');
    const row = container.querySelector('.new-row').cloneNode(true);
    row.querySelectorAll('input').forEach(i => i.value = '');
    container.appendChild(row);
}
</script>
{% endblock %}
